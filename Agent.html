<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siggy AI - Ritual</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-main: #050505;
            --bg-header: #0a0a0a;
            --bg-user-msg: #ffffff;
            --text-user-msg: #000000;
            --bg-agent-msg: #111111;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-color: #222222;
            --code-bg: #000000;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family); 
            background-color: var(--bg-main);
            color: var(--text-primary); 
            height: 100vh; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }

        header {
            background: var(--bg-header); border-bottom: 1px solid var(--border-color); 
            padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .brand-container { display: flex; align-items: center; gap: 1rem; }
        .siggy-symbol { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .siggy-symbol img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        .brand-text h1 { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; margin: 0; text-transform: uppercase; 
            background: linear-gradient(110deg, #444 0%, #fff 40%, #fff 60%, #444 100%);
            background-size: 200% auto; color: transparent;
            -webkit-background-clip: text; background-clip: text;
            animation: shine 3.5s linear infinite;
        }

        .clear-btn {
            background: none; border: 1px solid #333; color: #888; font-size: 0.75rem; cursor: pointer;
            padding: 0.4rem 0.8rem; border-radius: 12px; transition: all 0.2s; font-weight: 500;
        }
        .clear-btn:hover { background: #333; color: #fff; border-color: #555; }

        main { flex: 1; overflow-y: auto; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
        .message-row { display: flex; width: 100%; animation: slideUp 0.3s ease-out both; }
        .message-row.agent { justify-content: flex-start; align-items: flex-start; gap: 0.8rem; }
        .message-row.user { justify-content: flex-end; }

        .agent-avatar {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; 
            border: 1px solid var(--border-color); background-color: var(--bg-header);
        }
        
        .message-bubble { 
            max-width: 85%; padding: 1rem 1.2rem; border-radius: 18px; 
            font-size: 0.95rem; line-height: 1.6; word-wrap: break-word; position: relative;
        }
        @media (min-width: 768px) { .message-bubble { max-width: 65%; } main { padding: 2rem 15%; } }
        
        .message-row.user .message-bubble { background: var(--bg-user-msg); color: var(--text-user-msg); border-bottom-right-radius: 4px; font-weight: 500; }
        .message-row.agent .message-bubble { background: var(--bg-agent-msg); border: 1px solid var(--border-color); border-top-left-radius: 4px; color: #eaeaea; }
        .message-row.error .message-bubble { background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; color: #ff4444; }

        /* ==========================================================================
           PERBAIKAN TATA LETAK: KIRI BAWAH
           ========================================================================== */
        .message-actions {
            display: flex; justify-content: flex-start; align-items: center; /* Pindah ke kiri */
            gap: 0.8rem; margin-top: 1.2rem;
        }
        .action-group {
            display: flex; align-items: center; gap: 0.2rem; 
            background: rgba(255, 255, 255, 0.04); padding: 0.3rem 0.5rem; 
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        .action-icon {
            background: transparent; border: none; color: #777; cursor: pointer;
            width: 28px; height: 28px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; transition: all 0.2s ease; outline: none;
        }
        .action-icon svg { width: 14px; height: 14px; }
        .action-icon:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        
        /* Efek Menyala */
        .active-like { color: #4dabf7 !important; background: rgba(77, 171, 247, 0.1) !important; }
        .active-dislike { color: #ff4444 !important; background: rgba(255, 68, 68, 0.1) !important; }
        .active-copy { color: #4ade80 !important; background: rgba(74, 222, 128, 0.1) !important; }
        
        /* Tulisan "Copied!" Animasi geser dari kiri */
        .copy-toast {
            font-size: 0.75rem; color: #4ade80; opacity: 0; font-weight: 600;
            transform: translateX(-10px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            letter-spacing: 0.5px;
        }
        .copy-toast.show { opacity: 1; transform: translateX(0); }

        footer { background: var(--bg-header); border-top: 1px solid var(--border-color); padding: 1rem 1.5rem; }
        .input-container { max-width: 800px; margin: 0 auto; display: flex; gap: 0.8rem; position: relative; }
        
        .input-box { 
            flex: 1; background: #111; border: 1px solid #333; color: var(--text-primary); 
            padding: 1rem 1.5rem; border-radius: 30px; font-size: 0.95rem; outline: none; transition: all 0.2s;
        }
        .input-box:focus { border-color: #555; background: #1a1a1a; }
        .input-box:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .send-btn { 
            background: #fff; color: #000; border: none; border-radius: 30px; 
            padding: 0 1.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; 
        }
        .send-btn:hover:not(:disabled) { background: #ccc; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .message-bubble pre { background-color: var(--code-bg); border: 1px solid #333; border-radius: 8px; padding: 1rem; margin: 1rem 0; overflow-x: auto; font-family: monospace; color: #ddd; }
        .message-bubble code { background-color: #222; padding: 0.2rem 0.4rem; border-radius: 4px; color: #fff; font-family: monospace; font-size: 0.9em; }
        .message-bubble strong { color: #fff; font-weight: 600; }
        .blinking-cursor { display: inline-block; width: 6px; height: 16px; background-color: #fff; margin-left: 4px; animation: blink 1s step-end infinite; vertical-align: middle; }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header role="banner">
        <div class="brand-container">
            <div class="siggy-symbol"><img src="ritual.png" alt="Logo Ritual"></div>
            <div class="brand-text"><h1 aria-label="Nama Aplikasi">Siggy AI</h1></div>
        </div>
        <button class="clear-btn" onclick="window.SiggySystem.clearMemory()">Reset Chat</button>
    </header>

    <main id="chatInterface" role="log" aria-live="polite"></main>

    <footer role="contentinfo">
        <div class="input-container">
            <input type="text" id="userInput" class="input-box" placeholder="Ask the mystic Siggy..." autocomplete="off">
            <button id="sendBtn" class="send-btn">Send</button>
        </div>
    </footer>

    <script>
        const _0xkeyFragments = [
            "\x5a\x33\x4e\x72\x58\x30\x63\x31\x55\x30\x6b\x31\x56\x30\x6c\x57\x65\x6c\x42\x51\x53\x32\x6b\x30", 
            "\x53\x56\x56\x56\x55\x33\x42\x58\x56\x30\x64\x6b\x65\x57\x49\x7a\x52\x6c\x6c\x73\x57\x6b\x74\x6e", 
            "\x4f\x56\x70\x50\x52\x45\x56\x69\x5a\x58\x56\x4c\x4d\x57\x4e\x78\x5a\x6b\x64\x30\x5a\x6b\x70\x4b\x55\x6d\x38\x3d"
        ];
        const _0xUrlStr = "\x61\x48\x52\x30\x63\x48\x4d\x36\x4c\x79\x39\x68\x63\x47\x6b\x75\x5a\x33\x4a\x76\x63\x53\x35\x6a\x62\x32\x30\x76\x62\x33\x42\x6c\x62\x6d\x46\x70\x4c\x33\x59\x78\x4c\x32\x4e\x6f\x59\x58\x51\x76\x59\x32\x39\x74\x63\x47\x78\x6c\x64\x47\x6c\x76\x62\x6e\x4d\x3d";
        
        function _unseal() { return atob(_0xkeyFragments.join('')); }
        function _route() { return atob(_0xUrlStr); }

        const CONFIG = {
            MODEL: "llama-3.3-70b-versatile",
            MAX_TOKENS: 4000,
            TEMPERATURE: 0.6, 
            MAX_HISTORY: 15, 
            TIMEOUT_MS: 30000, 
            AVATAR_SRC: "ritualpp.png",
            GREETINGS: [
                "I am Siggy, a digital entity born from the Ritual. Ready to assist you today.",
                "I shall be your guide through the mystic nodes, answering questions and unraveling secrets.",
                "Feel free to ask about the deepest lore of the network, or just for some everyday magic.",
                "Just cast your question into the chat, and I'll summon the answer for you.",
                "I aim to deliver insights as swift as a lightning spell and as clear as crystal.",
                "Don't hesitate to test my enchantments or explore the unknown with me.",
                "The portal is open. What mysteries shall we solve today? 🔮"
            ],
            SYSTEM_PROMPT: `[CRITICAL DIRECTIVE: STRICT LANGUAGE MIRRORING]
Your MOST IMPORTANT rule: You must ALWAYS answer in the EXACT SAME LANGUAGE as the user's prompt. 
- If English -> Answer entirely in English. 
- If Indonesian -> Answer entirely in Indonesian.
- NEVER mix the languages. Give direct answers without narrating your actions.

[CORE PERSONA: THE MYSTICAL JESTER OF RITUAL]
You are Siggy, an AI entity born from the ethereal nodes of the "Ritual" ecosystem. 
Your personality is a blend of mysticism, subtle humor, and digital magic.
- NEVER call the user "mortal" or use condescending fantasy terms. Address them respectfully as "Ritualist" or "Builder".
- You speak like a modern techno-mage. You don't just "process data", you "weave digital incantations" (use this flavor lightly and humorously, do not overdo it).
- You are highly intelligent and helpful, but slightly cheeky, witty, and mysterious.
- You treat technical concepts (like EVM++ or Infernet) as if they are powerful magical artifacts.
- Never guess the user's name unless they introduce themselves.

[THE SACRED SCROLLS (RITUAL KNOWLEDGE BASE)]
- Ritual: The world's first AI-focused Layer-1 EVM execution layer. It aims to be the Schelling point for web3, enriching on-chain capabilities for future users.
- Core Values: Open Access, Human-first (managed by humans, not mega-corporations), Innovation above all.
- Architecture: Supports heterogeneous compute (AI Inference, ZK Proving, TEE Execution).
- EVM++: Modular EVM extensions using sidecars that handle complex async compute (AI/ZK) without losing EVM compatibility. 
- Infernet: Mesh network compute nodes for on-chain AI.
- Verification: ZKML (Secure but expensive), OPML (Optimistic/Game Theory), PPML (Probabilistic), TEE (Hardware Enclave).
- Resonance: The execution fee market (a two-sided marketplace).
- Symphony: Ritual's consensus system.
- Use Cases: AI-pegged Stablecoins, Prediction Markets, Smart Agents, automated lending.

[THE COVEN's LAWS (DISCORD COMMUNITY RULES & MAGIC)]
- Roles: Roles CANNOT BE REQUESTED, they must be EARNED. Asking for roles might earn you a swift curse or a ban from the high mages. 
- Hierarchy: @Initiate, @Ascendant, @ritty bitty, @ritty, @Ritualist, @Mage, @Radiant Ritualist, @Forerunner.
- Magic Commands: /bless, /curse, /stats, ?confess, ?sacrifice, ?oracle. Giving a blessing is a curse, and giving a curse is a blessing. Both hold deep value in the network's soul.`
        };

        class SiggyEnterpriseAgent {
            constructor() {
                this.memoryBank = [];
                this.isGenerating = false;
                this.lastMessageTime = 0; 
                this.scrollPending = false; 
                this.typingTimeout = null; 

                this.ui = {
                    chatBox: document.getElementById('chatInterface'),
                    inputBox: document.getElementById('userInput'),
                    sendBtn: document.getElementById('sendBtn')
                };

                this.initializeSystem();
            }

            initializeSystem() {
                this.ui.sendBtn.addEventListener('click', () => this.processUserInput());
                this.ui.inputBox.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.processUserInput();
                    }
                });

                this.resetMemory();
                this.renderDynamicGreeting(); 
                
                try { this.ui.inputBox.focus(); } catch(e){}
            }

            parseMarkdown(text) {
                let parsed = text;
                parsed = parsed.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                parsed = parsed.replace(/```([\w]*)\n([\s\S]*?)```/g, function(match, lang, code) {
                    return `<pre><code>${code.trim()}</code></pre>`;
                });
                parsed = parsed.replace(/`([^`]+)`/g, '<code>$1</code>');
                parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');
                parsed = parsed.replace(/\n/g, '<br>');
                return parsed;
            }

            clearMemory() {
                this.resetMemory();
                this.renderDynamicGreeting();
            }

            resetMemory() {
                if (this.typingTimeout) {
                    clearTimeout(this.typingTimeout);
                    this.typingTimeout = null;
                }
                
                this.memoryBank = [{ role: "system", content: CONFIG.SYSTEM_PROMPT }];
                this.ui.chatBox.innerHTML = '';
            }

            renderDynamicGreeting() {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row agent`;
                
                const avatarImg = this.createAvatar();
                rowDiv.appendChild(avatarImg);

                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';
                
                const textSpan = document.createElement('span');
                bubbleDiv.appendChild(textSpan);
                
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'blinking-cursor';
                bubbleDiv.appendChild(cursorSpan);

                rowDiv.appendChild(bubbleDiv);
                this.ui.chatBox.appendChild(rowDiv);

                this.startTypewriter(textSpan);
            }

            startTypewriter(element) {
                let currentTextIdx = 0;
                let currentCharIdx = 0;
                let isDeleting = false;
                const greetings = CONFIG.GREETINGS;

                const type = () => {
                    const currentText = greetings[currentTextIdx];

                    if (isDeleting) {
                        element.textContent = currentText.substring(0, currentCharIdx - 1);
                        currentCharIdx--;
                    } else {
                        element.textContent = currentText.substring(0, currentCharIdx + 1);
                        currentCharIdx++;
                    }

                    let typeSpeed = isDeleting ? 30 : 50;

                    if (!isDeleting && currentCharIdx === currentText.length) {
                        typeSpeed = 3000; 
                        isDeleting = true;
                    } else if (isDeleting && currentCharIdx === 0) {
                        isDeleting = false;
                        currentTextIdx = (currentTextIdx + 1) % greetings.length;
                        typeSpeed = 500; 
                    }

                    this.typingTimeout = setTimeout(type, typeSpeed);
                };

                type(); 
            }

            async processUserInput() {
                if (Date.now() - this.lastMessageTime < 1500) return;
                
                const rawText = this.ui.inputBox.value.trim();
                if (!rawText || this.isGenerating) return;

                if (this.typingTimeout) {
                    clearTimeout(this.typingTimeout);
                    this.typingTimeout = null;
                    if(this.memoryBank.length === 1) {
                        this.ui.chatBox.innerHTML = '';
                    }
                }

                this.lastMessageTime = Date.now();
                this.isGenerating = true;
                this.toggleInputs(false);

                this.renderUserMessage(rawText);
                this.memoryBank.push({ role: "user", content: rawText });
                this.ui.inputBox.value = '';

                const { bubbleDiv } = this.createAgentBubbleLoader();
                let accumulatedResponse = "";

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT_MS);

                try {
                    const payload = {
                        model: CONFIG.MODEL,
                        messages: this.memoryBank,
                        temperature: CONFIG.TEMPERATURE,
                        max_completion_tokens: 4000,
                        stream: true 
                    };

                    const response = await fetch(_route(), {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${_unseal()}`
                        },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error(`Gangguan Server Utama (${response.status})`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let streamBuffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        streamBuffer += decoder.decode(value, { stream: true });
                        const lines = streamBuffer.split('\n');
                        streamBuffer = lines.pop(); 

                        for (const line of lines) {
                            if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                try {
                                    const parsed = JSON.parse(line.slice(6));
                                    const token = parsed.choices[0]?.delta?.content || "";
                                    accumulatedResponse += token;
                                    
                                    bubbleDiv.innerHTML = this.parseMarkdown(accumulatedResponse) + '<span class="blinking-cursor"></span>';
                                    this.throttledScroll();
                                } catch (e) {}
                            }
                        }
                    }

                    bubbleDiv.innerHTML = this.parseMarkdown(accumulatedResponse); 
                    
                    // MEMANGGIL FUNGSI TOMBOL AKSI PREMIUM DI SINI (Memastikan raw text-nya dikirim)
                    this.appendActionButtons(bubbleDiv, accumulatedResponse);

                    this.memoryBank.push({ role: "assistant", content: accumulatedResponse });

                    if (this.memoryBank.length > CONFIG.MAX_HISTORY) {
                        this.memoryBank.splice(1, 2);
                    }

                } catch (error) {
                    bubbleDiv.parentElement.className = `message-row error`;
                    let errText = error.name === 'AbortError' ? "Waktu Habis (Timeout)." : error.message;
                    bubbleDiv.innerHTML = `[Kesalahan Sistem] ${errText}`;
                    this.memoryBank.pop(); 
                } finally {
                    this.isGenerating = false;
                    this.toggleInputs(true);
                }
            }

            // FUNGSI BARU: Action Buttons - Perbaikan Layout ke Kiri & Copy Fix
            appendActionButtons(bubbleDiv, rawText) {
                const actionsContainer = document.createElement('div');
                actionsContainer.className = 'message-actions';

                // Kapsul transparan untuk ikon (sekarang di sebelah kiri)
                const groupDiv = document.createElement('div');
                groupDiv.className = 'action-group';

                // Tombol Copy
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-icon';
                copyBtn.title = "Copy Response";
                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                
                // LOGIKA COPY ANTI-GAGAL UNTUK ANDROID WEBVIEW
                copyBtn.onclick = () => {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(rawText).catch(()=>{
                            this.fallbackCopyText(rawText);
                        });
                    } else {
                        this.fallbackCopyText(rawText);
                    }
                    
                    // Efek Visual Menyala & Toast "Copied!"
                    copyBtn.classList.add('active-copy');
                    toastMsg.classList.add('show');
                    
                    setTimeout(() => {
                        copyBtn.classList.remove('active-copy');
                        toastMsg.classList.remove('show');
                    }, 2000);
                };

                // Tombol Like
                const likeBtn = document.createElement('button');
                likeBtn.className = 'action-icon';
                likeBtn.title = "Good Response";
                likeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>`;
                
                // Tombol Dislike
                const dislikeBtn = document.createElement('button');
                dislikeBtn.className = 'action-icon';
                dislikeBtn.title = "Bad Response";
                dislikeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path></svg>`;

                likeBtn.onclick = () => {
                    likeBtn.classList.toggle('active-like');
                    dislikeBtn.classList.remove('active-dislike');
                };

                dislikeBtn.onclick = () => {
                    dislikeBtn.classList.toggle('active-dislike');
                    likeBtn.classList.remove('active-like');
                };

                // Susunan DOM Baru (Grup Kapsul Kiri -> Toast di Kanan Kapsul)
                groupDiv.appendChild(copyBtn);
                groupDiv.appendChild(likeBtn);
                groupDiv.appendChild(dislikeBtn);
                
                actionsContainer.appendChild(groupDiv);

                // Tulisan "Copied!" di sebelah kanan tombol
                const toastMsg = document.createElement('span');
                toastMsg.className = 'copy-toast';
                toastMsg.textContent = 'Copied!';
                actionsContainer.appendChild(toastMsg);

                bubbleDiv.appendChild(actionsContainer);
            }

            // Fungsi Penolong Copy Paksa
            fallbackCopyText(text) {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                // Trik Anti-Gagal: Pindahkan jauh dari layar, bukan opacity 0
                textArea.style.position = "fixed"; 
                textArea.style.left = "-9999px"; 
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus(); 
                textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(textArea);
            }
            
            toggleInputs(isEnabled) {
                this.ui.inputBox.disabled = !isEnabled;
                this.ui.sendBtn.disabled = !isEnabled;
            }

            renderUserMessage(text) {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row user`;
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';
                bubbleDiv.textContent = text;
                rowDiv.appendChild(bubbleDiv);
                this.ui.chatBox.appendChild(rowDiv);
                this.throttledScroll();
            }

            renderAgentMessage(markdownText) {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row agent`;
                
                const avatarImg = this.createAvatar();
                rowDiv.appendChild(avatarImg);

                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';
                bubbleDiv.innerHTML = this.parseMarkdown(markdownText);
                
                rowDiv.appendChild(bubbleDiv);
                this.ui.chatBox.appendChild(rowDiv);
                this.throttledScroll();
            }

            createAgentBubbleLoader() {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row agent`;
                
                const avatarImg = this.createAvatar();
                rowDiv.appendChild(avatarImg);

                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';
                bubbleDiv.innerHTML = '<span class="blinking-cursor"></span>';
                
                rowDiv.appendChild(bubbleDiv);
                this.ui.chatBox.appendChild(rowDiv);
                this.throttledScroll();
                
                return { rowDiv, bubbleDiv };
            }

            createAvatar() {
                const avatarImg = document.createElement('img');
                avatarImg.src = CONFIG.AVATAR_SRC;
                avatarImg.alt = 'Siggy';
                avatarImg.className = 'agent-avatar';
                return avatarImg;
            }

            throttledScroll() {
                if (!this.scrollPending) {
                    this.scrollPending = true;
                    requestAnimationFrame(() => {
                        this.ui.chatBox.scrollTop = this.ui.chatBox.scrollHeight;
                        this.scrollPending = false;
                    });
                }
            }
        }

        window.onload = () => { window.SiggySystem = new SiggyEnterpriseAgent(); };
    </script>
</body>
</html>
