<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Siggy AI - Ritual</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --text-primary: #ffffff;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --bg-color: #0b0710;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            font-family: var(--font-family); 
            color: var(--text-primary); 
            overflow: hidden; 
            background-color: var(--bg-color); 
            -webkit-font-smoothing: antialiased;
        }

        .premium-bg-wrapper {
            position: fixed; inset: 0; 
            z-index: -1; pointer-events: none;
            background: linear-gradient(145deg, #0b0710 0%, #140b2e 50%, #1a0f35 100%);
        }

        .app-container {
            display: flex; flex-direction: column;
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        header {
            background: transparent; 
            padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; 
            flex-shrink: 0; z-index: 20;
        }
        .brand-container { display: flex; align-items: center; gap: 1rem; }
        
        .siggy-symbol { 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; border-radius: 50%; overflow: hidden;
        }
        .siggy-symbol img { width: 100%; height: 100%; object-fit: contain; display: block; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        
        .brand-text h1 { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; margin: 0; text-transform: uppercase; 
            background: linear-gradient(110deg, #aaa 0%, #fff 40%, #fff 60%, #aaa 100%);
            background-size: 200% auto; color: transparent;
            -webkit-background-clip: text; background-clip: text;
            animation: shine 3.5s linear infinite;
        }

        .header-actions { display: flex; gap: 0.6rem; align-items: center; }

        .glass-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e2e2e2; 
            cursor: pointer; border-radius: 12px; transition: all 0.2s ease; font-weight: 500;
            display: flex; align-items: center; justify-content: center;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.15); color: #fff; transform: translateY(-1px); }
        .glass-btn:active { transform: scale(0.95); }
        .glass-btn.text-btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        .glass-btn.icon-btn { width: 34px; height: 34px; border-radius: 50%; }
        .glass-btn.icon-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; }

        .avatar-modal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .avatar-modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .avatar-modal {
            background: #181126; border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px; padding: 1.5rem; width: 90%; max-width: 360px;
            transform: translateY(20px) scale(0.95); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 1rem;
        }
        .avatar-modal-overlay.active .avatar-modal { transform: translateY(0) scale(1); }
        
        .avatar-modal-header { display: flex; justify-content: space-between; align-items: center; }
        .avatar-modal-header h3 { font-size: 1rem; font-weight: 600; margin: 0; color: #fff; }
        .avatar-modal-close { background: transparent; border: none; color: #aaa; cursor: pointer; padding: 0.2rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s;}
        .avatar-modal-close:hover { color: #fff; }
        .avatar-modal-close svg { width: 20px; height: 20px; }
        
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.8rem; }
        .avatar-option {
            width: 100%; aspect-ratio: 1; border-radius: 50%; object-fit: cover; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1); background: #000; transition: all 0.2s ease;
        }
        .avatar-option:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.4); }
        .avatar-option.selected { border-color: #a78bfa; box-shadow: 0 0 12px rgba(167, 139, 250, 0.5); transform: scale(1.05); }

        main { 
            flex: 1 1 0; overflow-y: auto; overflow-x: hidden; padding: 1rem 1rem 2rem 1rem; 
            display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch; z-index: 10;
        }
        .message-row { display: flex; width: 100%; animation: slideUp 0.3s ease-out both; }
        .message-row.agent { justify-content: flex-start; align-items: flex-start; gap: 0.8rem; }
        .message-row.user { justify-content: flex-end; }

        .agent-avatar {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; 
            border: 1px solid rgba(255,255,255,0.2); background-color: #111; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); 
            transition: all 0.2s ease; cursor: pointer;
        }
        .agent-avatar:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.5); }
        
        .message-bubble { 
            max-width: 85%; padding: 1rem 1.2rem; border-radius: 18px; 
            font-size: 0.95rem; line-height: 1.6; word-wrap: break-word; position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        @media (min-width: 768px) { .message-bubble { max-width: 65%; } main { padding: 2rem 15%; } }
        
        .message-row.user .message-bubble { 
            background: rgba(45, 35, 60, 0.95); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; border-bottom-right-radius: 4px; font-weight: 500; 
        }
        .message-row.agent .message-bubble { 
            background: rgba(25, 18, 40, 0.95); border: 1px solid rgba(255,255,255,0.08); 
            border-top-left-radius: 4px; color: #eaeaea; 
        }
        .message-row.error .message-bubble { background: rgba(60, 20, 20, 0.95); border: 1px solid rgba(255, 68, 68, 0.4); color: #ff8888; }

        .message-actions { display: flex; justify-content: flex-start; align-items: center; gap: 0.8rem; margin-top: 1.2rem; }
        .action-group {
            display: flex; align-items: center; gap: 0.2rem; 
            background: rgba(255, 255, 255, 0.05); padding: 0.3rem 0.5rem; 
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .action-icon {
            background: transparent; border: none; color: #bbb; cursor: pointer;
            width: 28px; height: 28px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; transition: all 0.2s ease; outline: none;
        }
        .action-icon svg { width: 14px; height: 14px; }
        .action-icon:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        
        .active-like { color: #4dabf7 !important; background: rgba(77, 171, 247, 0.2) !important; }
        .active-dislike { color: #ff4444 !important; background: rgba(255, 68, 68, 0.2) !important; }
        .active-copy { color: #4ade80 !important; background: rgba(74, 222, 128, 0.2) !important; }
        .active-speak { color: #fff !important; background: rgba(255, 255, 255, 0.25) !important; }

        @keyframes shine { 100% { background-position: 200% center; } }
        .spinner-icon { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .copy-toast {
            font-size: 0.75rem; color: #4ade80; opacity: 0; font-weight: 600;
            transform: translateX(-10px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: 0.5px;
        }
        .copy-toast.show { opacity: 1; transform: translateX(0); }

        .global-audio-player {
            position: fixed; top: 80px; left: 50%; transform: translate(-50%, -20px);
            background: rgba(25, 18, 40, 0.95); border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 40px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 1rem;
            z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: max-content; max-width: 90%;
        }
        .global-audio-player.visible { opacity: 1; pointer-events: auto; transform: translate(-50%, 0); }
        
        .player-btn {
            background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.2); 
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .player-btn:hover { background: rgba(255,255,255,0.25); }
        .player-btn:active { transform: scale(0.9); }
        .player-btn svg { width: 14px; height: 14px; fill: currentColor; }
        
        .player-time { color: #fff; font-variant-numeric: tabular-nums; font-size: 0.85rem; font-weight: 500; }
        
        .player-visualizer { display: flex; align-items: center; gap: 3px; height: 20px; padding: 0 5px; }
        .visualizer-bar { width: 3px; background-color: rgba(255,255,255,0.6); border-radius: 3px; height: 4px; transition: height 0.1s ease; }
        
        @keyframes soundWave { 0% { height: 4px; } 50% { height: 18px; background-color: #fff; } 100% { height: 4px; } }
        .global-audio-player.playing .visualizer-bar { animation: soundWave 1s infinite ease-in-out; }
        .global-audio-player.playing .visualizer-bar:nth-child(1) { animation-delay: 0.0s; }
        .global-audio-player.playing .visualizer-bar:nth-child(2) { animation-delay: 0.2s; }
        .global-audio-player.playing .visualizer-bar:nth-child(3) { animation-delay: 0.4s; }
        .global-audio-player.playing .visualizer-bar:nth-child(4) { animation-delay: 0.2s; }
        .global-audio-player.playing .visualizer-bar:nth-child(5) { animation-delay: 0.5s; }

        .player-close {
            background: transparent; border: none; color: #aaa; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; padding: 5px; margin-left: 5px; transition: color 0.2s;
        }
        .player-close:hover { color: #fff; }
        .player-close svg { width: 16px; height: 16px; }

        footer { 
            background: transparent; border-top: none; 
            padding: 1rem 2rem 1.5rem 2rem; 
            flex-shrink: 0; z-index: 20; width: 100%;
            display: flex; justify-content: center;
        }
        
        .input-container { 
            width: 100%; max-width: 800px; 
            display: flex; gap: 0.8rem; 
            align-items: center;
        }
        
        .input-box { 
            flex: 1; background: rgba(30, 20, 45, 0.85); border: 1px solid rgba(255,255,255,0.15); color: var(--text-primary); 
            padding: 1rem 1.5rem; border-radius: 30px; font-size: 0.95rem; outline: none; transition: all 0.2s;
        }
        .input-box::placeholder { color: #aaa; letter-spacing: 1px; font-size: 0.85rem; text-transform: uppercase; }
        .input-box:focus { border-color: rgba(255,255,255,0.4); background: rgba(45, 30, 65, 0.9); }
        .input-box:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .send-btn { 
            background: rgba(45, 30, 65, 0.9); color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; 
            padding: 0 1.5rem; height: 100%; min-height: 50px; font-weight: 600; cursor: pointer; transition: all 0.2s; 
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover:not(:disabled) { background: rgba(60, 45, 85, 1); transform: translateY(-2px); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .message-bubble pre { background-color: #0b0710; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; margin: 1rem 0; overflow-x: auto; font-family: monospace; color: #ddd; }
        .message-bubble code { background-color: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 6px; color: #fff; font-family: monospace; font-size: 0.9em; }
        .message-bubble strong { color: #fff; font-weight: 600; }
        .blinking-cursor { display: inline-block; width: 6px; height: 16px; background-color: #fff; margin-left: 4px; animation: blink 1s step-end infinite; vertical-align: middle; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="premium-bg-wrapper"></div>

    <div class="app-container">

            </div>

    </div>

                this.ui.sendBtn.addEventListener('click', () => this.processUserInput());
                this.ui.inputBox.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); this.processUserInput(); }
                });

                this.ui.openAvatarBtn.addEventListener('click', () => this.openAvatarMenu());
                this.ui.closeAvatarBtn.addEventListener('click', () => this.closeAvatarMenu());
                this.ui.avatarModalOverlay.addEventListener('click', (e) => {
                    if (e.target === this.ui.avatarModalOverlay) this.closeAvatarMenu();
                });

                this.setupAudioPlayer();
                this.resetMemory();
                this.renderDynamicGreeting(); 
                try { this.ui.inputBox.focus(); } catch(e){}
            }

            buildAvatarMenu() {
                this.ui.avatarGrid.innerHTML = '';
                this.avatarList.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'avatar-option' + (this.activeAvatar === src ? ' selected' : '');
                    img.onclick = () => {
                        this.setActiveAvatar(src);
                        this.closeAvatarMenu();
                    };
                    this.ui.avatarGrid.appendChild(img);
                });
            }

            setActiveAvatar(src) {
                this.activeAvatar = src;
                document.querySelectorAll('.agent-avatar').forEach(img => {
                    img.style.opacity = 0.5;
                    setTimeout(() => {
                        img.src = src;
                        img.style.opacity = 1;
                    }, 150);
                });
            }

            openAvatarMenu() {
                this.buildAvatarMenu();
                this.ui.avatarModalOverlay.classList.add('active');
            }

            closeAvatarMenu() {
                this.ui.avatarModalOverlay.classList.remove('active');
            }

            setupAudioPlayer() {
                this.audioElement.addEventListener('timeupdate', () => {
                    const current = Math.floor(this.audioElement.currentTime) || 0;
                    const minutes = Math.floor(current / 60).toString().padStart(2, '0');
                    const seconds = (current % 60).toString().padStart(2, '0');
                    this.ui.playerTime.textContent = `${minutes}:${seconds}`;
                });
                this.audioElement.addEventListener('ended', () => this.stopAudio());
                this.ui.playerPlayBtn.addEventListener('click', () => {
                    if (this.audioElement.paused) { this.audioElement.play(); this.setAudioUIState(true); } 
                    else { this.audioElement.pause(); this.setAudioUIState(false); }
                });
                this.ui.playerClose.addEventListener('click', () => this.stopAudio());
            }

            setAudioUIState(isPlaying) {
                if (isPlaying) {
                    this.ui.playerContainer.classList.add('playing');
                    this.ui.iconPlay.style.display = 'none'; this.ui.iconPause.style.display = 'block';
                    if(this.currentAudioButton) this.currentAudioButton.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
                } else {
                    this.ui.playerContainer.classList.remove('playing');
                    this.ui.iconPlay.style.display = 'block'; this.ui.iconPause.style.display = 'none';
                    if(this.currentAudioButton) this.currentAudioButton.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
                }
            }

            stopAudio() {
                if (this.audioElement && this.audioElement.src) {
                    this.audioElement.pause();
                    try { this.audioElement.currentTime = 0; } catch(e) {}
                }
                this.ui.playerContainer.classList.remove('visible', 'playing');
                if (this.currentAudioButton) {
                    this.currentAudioButton.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
                    this.currentAudioButton.classList.remove('active-speak');
                    this.currentAudioButton = null;
                }
            }

            cleanTextForVoice(text) {
                let clean = text.replace(/```[\s\S]*?```/g, ''); 
                clean = clean.replace(/`[^`]*`/g, ''); 
                clean = clean.replace(/[*_~#>-]/g, ''); 
                clean = clean.replace(/<[^>]*>?/gm, ''); 
                return clean.trim().substring(0, 2500);
            }

            async fetchAndPlayAudio(cleanText, buttonElement) {
                buttonElement.classList.add('active-speak');
                buttonElement.innerHTML = `<svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>`;
                
                const requestBody = JSON.stringify({ text: cleanText, model_id: 'eleven_multilingual_v2', output_format: 'mp3_44100_128' });
                const keys = _getElevenKeys();
                let success = false; let response = null;

                for (let i = 0; i < keys.length; i++) {
                    try {
                        response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${CONFIG.VOICE_ID}`, {
                            method: 'POST', headers: { 'Accept': 'audio/mpeg', 'Content-Type': 'application/json', 'xi-api-key': keys[i] }, body: requestBody
                        });
                        if (response.ok) { success = true; break; }
                    } catch (e) { }
                }

                if (!success || !response) {
                    this.stopAudio(); this.currentAudioButton = null; 
                    alert("Aduh sayang, semua kristal sihir suaraku habis energinya. Kita coba lagi besok ya!"); return;
                }

                try {
                    const blob = await response.blob();
                    this.audioElement.src = URL.createObjectURL(blob);
                    await this.audioElement.play();
                    this.ui.playerContainer.classList.add('visible');
                    this.setAudioUIState(true);
                } catch (error) { this.stopAudio(); this.currentAudioButton = null; }
            }

            async playVoice(text, buttonElement) {
                if (this.currentAudioButton === buttonElement) {
                    if (this.audioElement.paused) {
                        if (this.audioElement.src && this.audioElement.src !== "") { this.audioElement.play(); this.setAudioUIState(true); } 
                        else { const cleanText = this.cleanTextForVoice(text); if (cleanText) this.fetchAndPlayAudio(cleanText, buttonElement); }
                    } else { this.audioElement.pause(); this.setAudioUIState(false); }
                    return;
                }
                this.stopAudio();
                const cleanText = this.cleanTextForVoice(text);
                if (!cleanText) return;
                this.currentAudioButton = buttonElement;
                this.fetchAndPlayAudio(cleanText, buttonElement);
            }

            parseMarkdown(text) {
                let parsed = text;
                parsed = parsed.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                parsed = parsed.replace(/```([\w]*)\n([\s\S]*?)```/g, function(match, lang, code) { return `<pre><code>${code.trim()}</code></pre>`; });
                parsed = parsed.replace(/`([^`]+)`/g, '<code>$1</code>');
                parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');
                parsed = parsed.replace(/\n/g, '<br>');
                return parsed;
            }

            clearMemory() { this.stopAudio(); this.resetMemory(); this.renderDynamicGreeting(); }
            resetMemory() {
                if (this.typingTimeout) { clearTimeout(this.typingTimeout); this.typingTimeout = null; }
                this.memoryBank = [{ role: "system", content: CONFIG.SYSTEM_PROMPT }];
                this.ui.chatBox.innerHTML = '';
            }

            renderDynamicGreeting() {
                const rowDiv = document.createElement('div'); rowDiv.className = `message-row agent`;
                rowDiv.appendChild(this.createAvatar());
                const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'message-bubble';
                const textSpan = document.createElement('span'); bubbleDiv.appendChild(textSpan);
                const cursorSpan = document.createElement('span'); cursorSpan.className = 'blinking-cursor'; bubbleDiv.appendChild(cursorSpan);
                rowDiv.appendChild(bubbleDiv); this.ui.chatBox.appendChild(rowDiv);
                this.startTypewriter(textSpan);
            }

            startTypewriter(element) {
                let currentTextIdx = 0; let currentCharIdx = 0; let isDeleting = false;
                const greetings = CONFIG.GREETINGS;
                const type = () => {
                    const currentText = greetings[currentTextIdx];
                    if (isDeleting) { element.textContent = currentText.substring(0, currentCharIdx - 1); currentCharIdx--; } 
                    else { element.textContent = currentText.substring(0, currentCharIdx + 1); currentCharIdx++; }
                    let typeSpeed = isDeleting ? 30 : 50;
                    if (!isDeleting && currentCharIdx === currentText.length) { typeSpeed = 3000; isDeleting = true; } 
                    else if (isDeleting && currentCharIdx === 0) { isDeleting = false; currentTextIdx = (currentTextIdx + 1) % greetings.length; typeSpeed = 500; }
                    this.typingTimeout = setTimeout(type, typeSpeed);
                };
                type(); 
            }

            requiresGemini(text) {
                const keywords = ['kode', 'code', 'script', 'program', 'html', 'css', 'js', 'javascript', 'python', 'c++', 'java', 'php', 'sql', 'algoritma', 'bug', 'error', 'jelaskan', 'detail', 'kompleks', 'analisis', 'vision', 'gambar', 'foto', 'image', 'buatkan'];
                return keywords.some(kw => text.toLowerCase().includes(kw));
            }

            async fetchGroq(agentBubble, controller) {
                const response = await fetch(_routeGroq(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_unsealGroq()}` },
                    body: JSON.stringify({ model: CONFIG.GROQ_MODEL, messages: this.memoryBank, temperature: CONFIG.TEMPERATURE, max_completion_tokens: CONFIG.MAX_TOKENS, stream: true }),
                    signal: controller.signal
                });
                if (!response.ok) throw new Error(`Groq Fail`);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let streamBuffer = "";
                let accumulatedResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    streamBuffer += decoder.decode(value, { stream: true });
                    let parts = streamBuffer.split(/\r?\n\r?\n/);
                    streamBuffer = parts.pop(); 
                    for (let part of parts) {
                        part = part.trim();
                        if (part.startsWith('data:')) {
                            let dataStr = part.substring(5).trim();
                            if (dataStr === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(dataStr);
                                accumulatedResponse += parsed.choices?.[0]?.delta?.content || "";
                                agentBubble.innerHTML = this.parseMarkdown(accumulatedResponse) + '<span class="blinking-cursor"></span>';
                                this.throttledScroll();
                            } catch (e) {}
                        }
                    }
                }
                return accumulatedResponse;
            }

            async fetchGemini(agentBubble, controller, apiKey) {
                const geminiHistory = this.memoryBank.filter(m => m.role !== 'system').map(m => ({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.content }]
                }));

                const url = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:streamGenerateContent?alt=sse&key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: CONFIG.SYSTEM_PROMPT }] },
                        contents: geminiHistory,
                        generationConfig: { temperature: CONFIG.TEMPERATURE, maxOutputTokens: CONFIG.MAX_TOKENS }
                    }),
                    signal: controller.signal
                });

                if (!response.ok) throw new Error(`Gemini Fail`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let streamBuffer = "";
                let accumulatedResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    streamBuffer += decoder.decode(value, { stream: true });
                    let parts = streamBuffer.split(/\r?\n\r?\n/);
                    streamBuffer = parts.pop(); 
                    for (let part of parts) {
                        part = part.trim();
                        if (part.startsWith('data:')) {
                            let dataStr = part.substring(5).trim();
                            if (dataStr === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(dataStr);
                                accumulatedResponse += parsed.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                agentBubble.innerHTML = this.parseMarkdown(accumulatedResponse) + '<span class="blinking-cursor"></span>';
                                this.throttledScroll();
                            } catch (e) {}
                        }
                    }
                }
                return accumulatedResponse;
            }

            async processUserInput() {
                if (Date.now() - this.lastMessageTime < 1000) return;
                const rawText = this.ui.inputBox.value.trim();
                if (!rawText || this.isGenerating) return;

                let agentBubble = null;

                try {
                    this.lastMessageTime = Date.now();
                    this.isGenerating = true;
                    this.toggleInputs(false);

                    if (this.typingTimeout) {
                        clearTimeout(this.typingTimeout);
                        this.typingTimeout = null;
                        if (this.memoryBank.length === 1) this.ui.chatBox.innerHTML = '';
                    }

                    this.renderUserMessage(rawText);
                    this.memoryBank.push({ role: "user", content: rawText });
                    this.ui.inputBox.value = '';

                    agentBubble = this.createAgentBubbleLoader();
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT_MS);

                    let accumulatedResponse = "";
                    let success = false;
                    const useGemini = this.requiresGemini(rawText);

                    if (useGemini) {
                        const gemKeys = _getGeminiKeys();
                        for (let k of gemKeys) {
                            try {
                                agentBubble.innerHTML = '<span class="blinking-cursor"></span>';
                                accumulatedResponse = await this.fetchGemini(agentBubble, controller, k);
                                if(accumulatedResponse) { success = true; break; }
                            } catch(e) {}
                        }
                    }

                    if (!success) {
                        try {
                            agentBubble.innerHTML = '<span class="blinking-cursor"></span>';
                            accumulatedResponse = await this.fetchGroq(agentBubble, controller);
                            if(accumulatedResponse) success = true;
                        } catch(e) {}
                    }

                    if (!success) {
                        accumulatedResponse = "Aduh sayang, koneksi sihirku sedang terganggu badai kosmik saat ini. Coba peluk aku dan ketik lagi sebentar lagi ya, cintaku!";
                    }

                    clearTimeout(timeoutId);

                    agentBubble.innerHTML = this.parseMarkdown(accumulatedResponse); 
                    this.appendActionButtons(agentBubble, accumulatedResponse);
                    this.memoryBank.push({ role: "assistant", content: accumulatedResponse });
                    if (this.memoryBank.length > CONFIG.MAX_HISTORY) this.memoryBank.splice(1, 2);

                } catch (error) {
                    if (agentBubble) {
                        const fallbackText = "Aduh sayang, sihirku sedikit tersendat barusan. Kita ulangi lagi ya?";
                        agentBubble.innerHTML = fallbackText;
                        this.memoryBank.push({ role: "assistant", content: fallbackText });
                    } else if (this.memoryBank[this.memoryBank.length - 1]?.role === "user") {
                        this.memoryBank.pop();
                    }
                } finally {
                    this.isGenerating = false;
                    this.toggleInputs(true);
                }
            }

            createAgentBubbleLoader() {
                const rowDiv = document.createElement('div');
                rowDiv.className = `message-row agent`;
                rowDiv.appendChild(this.createAvatar());
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';
                bubbleDiv.innerHTML = '<span class="blinking-cursor"></span>';
                rowDiv.appendChild(bubbleDiv);
                this.ui.chatBox.appendChild(rowDiv);
                this.throttledScroll();
                return bubbleDiv;
            }

            appendActionButtons(bubbleDiv, rawText) {
                const actionsContainer = document.createElement('div');
                actionsContainer.className = 'message-actions';

                const groupDiv = document.createElement('div');
                groupDiv.className = 'action-group';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-icon'; copyBtn.title = "Copy Response";
                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                copyBtn.onclick = () => {
                    if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(rawText).catch(()=>{ this.fallbackCopyText(rawText); }); } 
                    else { this.fallbackCopyText(rawText); }
                    copyBtn.classList.add('active-copy'); toastMsg.classList.add('show');
                    setTimeout(() => { copyBtn.classList.remove('active-copy'); toastMsg.classList.remove('show'); }, 2000);
                };

                const likeBtn = document.createElement('button');
                likeBtn.className = 'action-icon'; likeBtn.title = "Good Response";
                likeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>`;
                
                const dislikeBtn = document.createElement('button');
                dislikeBtn.className = 'action-icon'; dislikeBtn.title = "Bad Response";
                dislikeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path></svg>`;

                const speakBtn = document.createElement('button');
                speakBtn.className = 'action-icon'; speakBtn.title = "Read aloud";
                speakBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
                speakBtn.onclick = () => { this.playVoice(rawText, speakBtn); };

                likeBtn.onclick = () => { likeBtn.classList.toggle('active-like'); dislikeBtn.classList.remove('active-dislike'); };
                dislikeBtn.onclick = () => { dislikeBtn.classList.toggle('active-dislike'); likeBtn.classList.remove('active-like'); };

                groupDiv.appendChild(copyBtn); groupDiv.appendChild(likeBtn); groupDiv.appendChild(dislikeBtn); groupDiv.appendChild(speakBtn);
                actionsContainer.appendChild(groupDiv);

                const toastMsg = document.createElement('span');
                toastMsg.className = 'copy-toast'; toastMsg.textContent = 'Copied!';
                actionsContainer.appendChild(toastMsg);
                bubbleDiv.appendChild(actionsContainer);
            }

            fallbackCopyText(text) {
                let textArea = document.createElement("textarea"); textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-9999px"; textArea.style.top = "0";
                document.body.appendChild(textArea); textArea.focus(); textArea.select();
                try { document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(textArea);
            }
            
            toggleInputs(isEnabled) { this.ui.inputBox.disabled = !isEnabled; this.ui.sendBtn.disabled = !isEnabled; }
            
            createAvatar() { 
                const img = document.createElement('img'); 
                img.src = this.activeAvatar; 
                img.className = 'agent-avatar'; 
                img.title = 'Change Siggy\'s Avatar';
                img.onclick = () => this.openAvatarMenu();
                return img; 
            }

            renderUserMessage(text) {
                const rowDiv = document.createElement('div'); rowDiv.className = `message-row user`;
                const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'message-bubble'; bubbleDiv.textContent = text;
                rowDiv.appendChild(bubbleDiv); this.ui.chatBox.appendChild(rowDiv); this.throttledScroll();
            }
            throttledScroll() {
                if (!this.scrollPending) {
                    this.scrollPending = true;
                    requestAnimationFrame(() => { this.ui.chatBox.scrollTop = this.ui.chatBox.scrollHeight; this.scrollPending = false; });
                }
            }
        }

        window.onload = () => { window.SiggySystem = new SiggyEnterpriseAgent(); };
    </script>
</body>
